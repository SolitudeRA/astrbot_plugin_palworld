<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PalWorldTerminal 设置 · Dev Demo</title>
    <!-- 场景切换小条样式：仅 dev.html 内联，绝不进任何生产文件 / 构建产物 -->
    <style>
      #dev-scenario {
        position: fixed; right: 12px; bottom: 12px; z-index: 2147483647;
        font: 12px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #e8e8ea; background: #1c1c22; border: 1px solid #3a3a44;
        border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.35);
        width: 190px; overflow: hidden; user-select: none;
      }
      #dev-scenario .hd {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 10px; background: #26262e; cursor: pointer; font-weight: 600;
      }
      #dev-scenario .hd .caret { opacity: .7; transition: transform .15s; }
      #dev-scenario.collapsed .bd { display: none; }
      #dev-scenario.collapsed .caret { transform: rotate(-90deg); }
      #dev-scenario .bd { display: flex; flex-direction: column; gap: 6px; padding: 8px; }
      #dev-scenario button {
        text-align: left; padding: 6px 9px; border-radius: 7px; cursor: pointer;
        border: 1px solid #3a3a44; background: #24242b; color: #dcdce2; font: inherit;
      }
      #dev-scenario button:hover { background: #2e2e37; border-color: #4a4a57; }
      #dev-scenario button[data-active="1"] {
        background: #2f5bd0; border-color: #5c86f0; color: #fff; font-weight: 600;
      }
      #dev-scenario .ft { padding: 0 10px 8px; color: #8a8a95; font-size: 10.5px; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- 场景切换小条（右下角，可折叠）：切换 = 写 sessionStorage + reload，重置内存假后端为该场景 -->
    <div id="dev-scenario" class="collapsed">
      <div class="hd" id="dev-scenario-hd"><span>场景 · Dev</span><span class="caret">▾</span></div>
      <div class="bd">
        <button data-scenario="first">首次设置</button>
        <button data-scenario="multi">多服务器</button>
        <button data-scenario="single">单服务器</button>
        <button data-scenario="auditEmpty">审计空态</button>
        <button data-scenario="emptyConfig">无服务器空配置</button>
      </div>
      <div class="ft">点击切换 = 重载并重置假数据</div>
    </div>

    <script type="module" src="/src/dev/main-dev.ts"></script>
    <script>
      // 场景键须与 mockBridge.ts 的 SCENARIO_KEY / DEFAULT_SCENARIO 一致。
      (function () {
        var KEY = 'pw-dev-scenario', DEFAULT = 'multi';
        var COLLAPSE_KEY = 'pw-dev-scenario-collapsed';
        var panel = document.getElementById('dev-scenario');
        var active = DEFAULT;
        try { active = sessionStorage.getItem(KEY) || DEFAULT; } catch (e) {}
        // 折叠态记忆（默认折叠，避免遮挡）
        try { if (sessionStorage.getItem(COLLAPSE_KEY) === '0') panel.classList.remove('collapsed'); } catch (e) {}
        var btns = panel.querySelectorAll('button[data-scenario]');
        btns.forEach(function (b) {
          if (b.getAttribute('data-scenario') === active) b.setAttribute('data-active', '1');
          b.addEventListener('click', function () {
            try { sessionStorage.setItem(KEY, b.getAttribute('data-scenario')); } catch (e) {}
            location.reload();
          });
        });
        document.getElementById('dev-scenario-hd').addEventListener('click', function () {
          panel.classList.toggle('collapsed');
          try { sessionStorage.setItem(COLLAPSE_KEY, panel.classList.contains('collapsed') ? '1' : '0'); } catch (e) {}
        });
      })();
    </script>
  </body>
</html>
